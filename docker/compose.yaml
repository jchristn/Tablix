services:

  tablix-server:
    image: jchristn77/tablix-server:v0.3.0
    container_name: tablix-server
    ports:
      - "9100:9100"
      - "9102:9102"
    volumes:
      - ./tablix.json:/app/tablix.json
      - ./:/data
      - ./database.db:/app/database.db
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--max-time", "2", "http://localhost:9100/"]
      interval: 5s
      timeout: 2s
      retries: 2
    restart: unless-stopped

  tablix-ui:
    image: jchristn77/tablix-ui:v0.3.0
    container_name: tablix-ui
    ports:
      - "9101:9101"
    environment:
      - TABLIX_SERVER_URL=http://tablix-server:9100
      - TABLIX_UI_STARTUP_DELAY_SECONDS=15
    depends_on:
      tablix-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--max-time", "2", "http://localhost:9101/"]
      interval: 5s
      timeout: 2s
      retries: 2
      start_period: 15s
    restart: unless-stopped
