services:

  tablix-server:
    image: jchristn77/tablix-server:v0.2.0
    container_name: tablix-server
    ports:
      - "9100:9100"
      - "9102:9102"
    volumes:
      - ./tablix.json:/app/tablix.json
      - ./tablix.db:/app/tablix.db
      - ./database.db:/app/database.db
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "if curl -fsS --max-time 2 http://localhost:9100/ >/dev/null; then n=$$(cat /tmp/tablix-health-success 2>/dev/null || echo 0); n=$$((n+1)); echo $$n > /tmp/tablix-health-success; rm -f /tmp/tablix-health-fail; [ $$n -ge 2 ]; else rm -f /tmp/tablix-health-success; n=$$(cat /tmp/tablix-health-fail 2>/dev/null || echo 0); n=$$((n+1)); echo $$n > /tmp/tablix-health-fail; if [ $$n -ge 2 ]; then kill 1; fi; exit 1; fi"]
      interval: 5s
      timeout: 2s
      retries: 2
    restart: unless-stopped

  tablix-ui:
    image: jchristn77/tablix-ui:v0.2.0
    container_name: tablix-ui
    ports:
      - "9101:9101"
    environment:
      - TABLIX_SERVER_URL=http://tablix-server:9100
      - TABLIX_UI_STARTUP_DELAY_SECONDS=15
    depends_on:
      tablix-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "if curl -fsS --max-time 2 http://localhost:9101/ >/dev/null; then n=$$(cat /tmp/tablix-ui-health-success 2>/dev/null || echo 0); n=$$((n+1)); echo $$n > /tmp/tablix-ui-health-success; rm -f /tmp/tablix-ui-health-fail; [ $$n -ge 2 ]; else rm -f /tmp/tablix-ui-health-success; n=$$(cat /tmp/tablix-ui-health-fail 2>/dev/null || echo 0); n=$$((n+1)); echo $$n > /tmp/tablix-ui-health-fail; if [ $$n -ge 2 ]; then kill 1; fi; exit 1; fi"]
      interval: 5s
      timeout: 2s
      retries: 2
      start_period: 15s
    restart: unless-stopped
