server {
    listen 9101;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /v1/ {
        proxy_pass http://localhost:9100$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
